<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .joke-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            line-height: 1.6;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .joke-text {
            margin-bottom: 15px;
        }

        .punchline {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1em;
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }

        .punchline.show {
            opacity: 1;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 200px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            min-width: 150px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            color: #667eea;
            font-size: 1.2em;
            margin: 20px 0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .joke-type {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .joke-box {
                min-height: 120px;
                padding: 20px;
                font-size: 1.1em;
            }

            button {
                padding: 10px 20px;
                font-size: 0.95em;
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Get a random laugh!</p>

        <div class="error" id="error"></div>

        <div class="joke-box" id="jokeBox">
            <div class="loading show" id="loading">
                <span class="spinner"></span>Loading joke...
            </div>
            <div id="jokeContent" style="display: none;">
                <div class="joke-text" id="jokeText"></div>
                <div class="punchline" id="punchline"></div>
                <div class="joke-type" id="jokeType"></div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" id="newJokeBtn" onclick="getJoke()">Get New Joke</button>
            <button class="btn-secondary" id="punchlineBtn" onclick="showPunchline()" style="display: none;">Show Punchline</button>
        </div>
    </div>

    <script>
        let currentJoke = null;

        async function getJoke() {
            const jokeBox = document.getElementById('jokeBox');
            const loading = document.getElementById('loading');
            const jokeContent = document.getElementById('jokeContent');
            const errorDiv = document.getElementById('error');
            const newJokeBtn = document.getElementById('newJokeBtn');
            const punchlineBtn = document.getElementById('punchlineBtn');

            // Reset UI
            errorDiv.classList.remove('show');
            loading.classList.add('show');
            jokeContent.style.display = 'none';
            newJokeBtn.disabled = true;
            punchlineBtn.style.display = 'none';

            try {
                // Fetch joke from JokeAPI
                const response = await fetch('https://v2.jokeapi.dev/joke/Any?format=json');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error('Error getting joke');
                }

                currentJoke = data;

                // Display joke
                const jokeText = document.getElementById('jokeText');
                const punchline = document.getElementById('punchline');
                const jokeType = document.getElementById('jokeType');

                if (data.type === 'single') {
                    jokeText.textContent = data.joke;
                    punchline.style.display = 'none';
                    punchlineBtn.style.display = 'none';
                } else {
                    jokeText.textContent = data.setup;
                    punchline.textContent = data.delivery;
                    punchline.classList.remove('show');
                    punchlineBtn.style.display = 'inline-block';
                }

                jokeType.textContent = `${data.category} • ${data.type.toUpperCase()}`;

                loading.classList.remove('show');
                jokeContent.style.display = 'block';
                newJokeBtn.disabled = false;

            } catch (error) {
                console.error('Error:', error);
                loading.classList.remove('show');
                errorDiv.textContent = '❌ Oops! Could not load a joke. Please try again.';
                errorDiv.classList.add('show');
                newJokeBtn.disabled = false;
            }
        }

        function showPunchline() {
            const punchline = document.getElementById('punchline');
            punchline.classList.toggle('show');
            
            const punchlineBtn = document.getElementById('punchlineBtn');
            punchlineBtn.textContent = punchline.classList.contains('show') ? 'Hide Punchline' : 'Show Punchline';
        }

        // Load a joke on page load
        window.addEventListener('load', getJoke);
    </script>
</body>
</html>
